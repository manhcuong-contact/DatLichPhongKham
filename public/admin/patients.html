<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bệnh nhân - Admin - MediFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .sidebar { width: 260px; min-height: 100vh; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); position: fixed; left: 0; top: 0; padding: 1.5rem 1rem; z-index: 100; }
        .sidebar .logo { color: #fff; font-size: 1.3rem; font-weight: 800; padding: .5rem; margin-bottom: 2rem; display: flex; align-items: center; gap: .5rem; }
        .sidebar .logo i { color: #f87171; }
        .nav-link-side { display: flex; align-items: center; gap: .75rem; padding: .7rem 1rem; border-radius: .75rem; color: #94a3b8; font-weight: 500; text-decoration: none; margin-bottom: .25rem; transition: all .2s; }
        .nav-link-side:hover, .nav-link-side.active { background: rgba(255,255,255,.1); color: #fff; }
        .nav-link-side i { width: 20px; text-align: center; }
        .main-content { margin-left: 260px; padding: 2rem; min-height: 100vh; }
        .glass-table { background: #fff; border-radius: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .user-bar { background: #fff; border-radius: 1rem; padding: 1rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        <i class="bi bi-heart-pulse-fill"></i>
        MediFlow
    </div>
    <a href="/admin/dashboard.html" class="nav-link-side">
        <i class="bi bi-speedometer2"></i> Tổng quan
    </a>
    <a href="/admin/appointments.html" class="nav-link-side">
        <i class="bi bi-calendar-check"></i> Quản lý lịch hẹn
    </a>
    <a href="/admin/patients.html" class="nav-link-side active">
        <i class="bi bi-people"></i> Danh sách bệnh nhân
    </a>
    <hr style="border-color:rgba(255,255,255,.1); margin: 1rem 0;">
    <a href="#" class="nav-link-side text-danger" onclick="doLogout()">
        <i class="bi bi-box-arrow-left"></i> Đăng xuất
    </a>
</div>

<!-- Main -->
<div class="main-content">
    <div class="user-bar">
        <div>
            <h5 class="mb-0 fw-bold">Quản lý Bệnh nhân</h5>
            <small class="text-secondary">Danh sách toàn bộ bệnh nhân trên hệ thống</small>
        </div>
        <a href="/admin/dashboard.html" class="btn btn-outline-secondary btn-sm rounded-pill"><i class="bi bi-arrow-left"></i> Quay lại</a>
    </div>

    <div class="glass-table p-0 overflow-hidden">
        <div class="p-4 border-bottom d-flex align-items-center justify-content-between">
            <h6 class="fw-bold mb-0">Tất cả bệnh nhân</h6>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Họ và tên</th>
                        <th>Email</th>
                        <th>Số điện thoại</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="patient-list">
                    <tr><td colspan="4" class="text-center py-4 text-secondary">Tính năng đang trong quá trình hoàn thiện ở các phase tiếp theo...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function doLogout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/login.html';
    }
</script>
</body>
</html>
