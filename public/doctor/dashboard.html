<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển Bác sĩ - MediFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top navbar-glass">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">
                <i class="bi bi-heart-pulse-fill text-danger me-2"></i>MediFlow <span class="fs-6 text-primary">Doctor</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto me-3">
                    <li class="nav-item"><a class="nav-link fw-medium" href="/doctor/dashboard.html">Lịch khám hôm nay</a></li>
                </ul>
                <div id="nav-right" class="d-flex align-items-center"></div>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-5 pt-5 px-4">
        <div class="row g-4 mt-2">
            <!-- Sidebar -->
            <div class="col-lg-3">
                <div class="glass-card p-4 text-center mb-4">
                    <div class="position-relative d-inline-block mb-3">
                        <img id="profileAvatar" src="https://ui-avatars.com/api/?name=Doc" class="rounded-circle object-fit-cover border border-3 border-white shadow-sm" width="120" height="120" alt="Avatar">
                    </div>
                    <h5 class="fw-bold mb-1" id="profileName">Đang tải...</h5>
                    <p class="text-primary small fw-medium mb-1" id="profileSpecialty"></p>
                    <p class="text-secondary small mb-3"><i class="bi bi-hospital"></i> <span id="profileClinic"></span></p>
                </div>

                <div class="glass-card p-4">
                    <h6 class="fw-bold mb-3 border-bottom pb-2">Lọc danh sách</h6>
                    <div class="mb-3">
                        <label class="form-label small text-secondary">Trạng thái</label>
                        <select class="form-select form-select-sm" id="f_status">
                            <option value="">Tất cả</option>
                            <option value="pending">Chờ xác nhận</option>
                            <option value="confirmed">Đã xác nhận</option>
                            <option value="completed">Đã khám</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-secondary">Ngày khám</label>
                        <input type="date" class="form-control form-control-sm" id="f_date">
                    </div>
                    <button class="btn btn-outline-primary btn-sm w-100 rounded-pill" onclick="loadAppointments()">Lọc</button>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">Danh sách Bệnh nhân</h4>
                    <span class="badge bg-primary rounded-pill px-3 py-2" id="totalAppt">0 lịch hẹn</span>
                </div>
                
                <div class="glass-card p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Giờ khám</th>
                                    <th>Bệnh nhân</th>
                                    <th>Liên hệ</th>
                                    <th>Trạng thái</th>
                                    <th class="text-end pe-4">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="apptList">
                                <tr><td colspan="5" class="text-center py-4"><span class="spinner-border text-primary"></span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Update Status Modal -->
    <div class="modal fade" id="updateModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0" style="border-radius: 1rem;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Cập nhật Lịch khám</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="updateForm">
                        <input type="hidden" id="u_apptId">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Trạng thái mới</label>
                                <select class="form-select border-primary text-primary fw-medium" id="u_status" required onchange="toggleFields()">
                                    <option value="confirmed">Xác nhận lịch</option>
                                    <option value="completed">Hoàn thành (Đã khám)</option>
                                    <option value="cancelled">Hủy lịch</option>
                                </select>
                            </div>
                        </div>

                        <!-- Cancel Reason field (shows only when cancelled) -->
                        <div class="mb-3" id="cancelGroup" style="display:none;">
                            <label class="form-label text-danger">Lý do hủy</label>
                            <input type="text" class="form-control" id="u_cancelReason">
                        </div>

                        <!-- Medical result fields (shows only when completed) -->
                        <div id="medicalGroup" style="display:none;">
                            <div class="mb-3">
                                <label class="form-label fw-medium text-success">Chẩn đoán bệnh</label>
                                <textarea class="form-control" id="u_diagnosis" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-medium text-success">Đơn thuốc & Lời dặn</label>
                                <textarea class="form-control" id="u_prescription" rows="3"></textarea>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium text-secondary">Ghi chú nội bộ</label>
                            <textarea class="form-control bg-light" id="u_note" rows="2"></textarea>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary-gradient py-2" id="btnUpdate">Lưu cập nhật</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = api.getUser();
            if (!user || user.roleName !== 'doctor') {
                window.location.href = '/login.html';
                return;
            }
            
            // Set today's date as default filter
            document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
            
            loadProfile();
            loadAppointments();
        });

        async function loadProfile() {
            try {
                const res = await api.get('/auth/me'); // Doctor detail inside auth/me
                const doc = res.data;
                document.getElementById('profileName').textContent = doc.fullName;
                if(doc.avatarUrl) {
                    document.getElementById('profileAvatar').src = '/uploads/' + doc.avatarUrl;
                } else {
                    document.getElementById('profileAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(doc.fullName)}`;
                }
                
                // Get doctor info by getting /doctors with their ID maybe? 
                // Wait, auth/me returns what we need if we populated it.
                // Let's just fetch all doctors and find ourselves for specialty/clinic names
                const dRes = await api.get('/doctors');
                const myDoc = dRes.data.find(d => d.email === doc.email);
                if(myDoc) {
                    document.getElementById('profileSpecialty').textContent = myDoc.specialtyName;
                    document.getElementById('profileClinic').textContent = myDoc.clinicName;
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function loadAppointments() {
            try {
                const status = document.getElementById('f_status').value;
                const date = document.getElementById('f_date').value;
                
                let endpoint = '/appointments?limit=50';
                if (status) endpoint += `&status=${status}`;
                if (date) endpoint += `&dateFrom=${date}&dateTo=${date}`;
                
                const res = await api.get(endpoint);
                const tbody = document.getElementById('apptList');
                
                document.getElementById('totalAppt').textContent = `${res.data.length} lịch hẹn`;
                
                if (res.data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-secondary"><i class="bi bi-calendar-x fs-1 d-block mb-3"></i>Không có lịch hẹn nào</td></tr>`;
                    return;
                }
                
                tbody.innerHTML = '';
                res.data.forEach(a => {
                    let badge = '';
                    if(a.status==='pending') badge = '<span class="badge bg-warning text-dark">Chờ XN</span>';
                    else if(a.status==='confirmed') badge = '<span class="badge bg-primary">Đã XN</span>';
                    else if(a.status==='completed') badge = '<span class="badge bg-success">Đã khám</span>';
                    else badge = '<span class="badge bg-danger">Đã hủy</span>';
                    
                    const time = `${a.startTime.substring(0,5)} - ${a.endTime.substring(0,5)}`;
                    
                    tbody.innerHTML += `
                        <tr>
                            <td class="ps-4 fw-medium text-primary">${time}</td>
                            <td>
                                <div class="fw-bold">${a.patientName}</div>
                                <div class="small text-secondary text-truncate" style="max-width:200px" title="${a.symptoms || ''}">${a.symptoms || 'Không ghi chú triệu chứng'}</div>
                            </td>
                            <td>
                                <div class="small"><i class="bi bi-telephone text-secondary me-1"></i>${a.patientPhone||'N/A'}</div>
                                <div class="small text-muted">${a.patientEmail||''}</div>
                            </td>
                            <td>${badge}</td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm ${a.status === 'completed' || a.status === 'cancelled' ? 'btn-light disabled' : 'btn-outline-primary'} rounded-pill px-3" 
                                    onclick="openUpdate(${a.id}, '${a.status}')" ${a.status === 'completed' || a.status === 'cancelled' ? 'disabled' : ''}>
                                    Cập nhật
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error(e);
            }
        }

        function openUpdate(id, currentStatus) {
            document.getElementById('u_apptId').value = id;
            document.getElementById('u_status').value = currentStatus === 'pending' ? 'confirmed' : 'completed';
            
            document.getElementById('u_cancelReason').value = '';
            document.getElementById('u_diagnosis').value = '';
            document.getElementById('u_prescription').value = '';
            document.getElementById('u_note').value = '';
            
            toggleFields();
            new bootstrap.Modal(document.getElementById('updateModal')).show();
        }

        function toggleFields() {
            const st = document.getElementById('u_status').value;
            document.getElementById('cancelGroup').style.display = st === 'cancelled' ? 'block' : 'none';
            document.getElementById('medicalGroup').style.display = st === 'completed' ? 'block' : 'none';
        }

        document.getElementById('updateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnUpdate');
            btn.disabled = true;
            
            try {
                const id = document.getElementById('u_apptId').value;
                const status = document.getElementById('u_status').value;
                
                const body = { status };
                if (status === 'cancelled') body.cancelReason = document.getElementById('u_cancelReason').value;
                if (status === 'completed') {
                    body.diagnosis = document.getElementById('u_diagnosis').value;
                    body.prescription = document.getElementById('u_prescription').value;
                }
                body.note = document.getElementById('u_note').value;
                
                await api.put(`/appointments/${id}/status`, body);
                api.showToast('Cập nhật trạng thái thành công!');
                bootstrap.Modal.getInstance(document.getElementById('updateModal')).hide();
                loadAppointments();
            } catch (err) {
                api.showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
