<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển Bệnh nhân - MediFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top navbar-glass">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-heart-pulse-fill text-danger me-2"></i>MediFlow
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto me-3">
                    <li class="nav-item"><a class="nav-link fw-medium" href="/patient/dashboard.html">Bảng điều khiển</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="/patient/appointments.html">Lịch hẹn</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="/patient/history.html">Lịch sử khám</a></li>
                </ul>
                <div id="nav-right" class="d-flex align-items-center"></div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <div class="row g-4 mt-2">
            <!-- Sidebar -->
            <div class="col-lg-3">
                <div class="glass-card p-4 text-center">
                    <div class="position-relative d-inline-block mb-3">
                        <img id="profileAvatar" src="https://ui-avatars.com/api/?name=User" class="rounded-circle object-fit-cover border border-3 border-white shadow-sm" width="120" height="120" alt="Avatar">
                    </div>
                    <h5 class="fw-bold mb-1" id="profileName">Đang tải...</h5>
                    <p class="text-secondary small mb-3">Bệnh nhân</p>
                    
                    <div class="d-grid">
                        <button class="btn btn-outline-primary btn-sm mb-2" data-bs-toggle="modal" data-bs-target="#editProfileModal">Chỉnh sửa hồ sơ</button>
                    </div>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">Lịch hẹn sắp tới</h4>
                    <a href="/doctors.html" class="btn btn-primary-gradient"><i class="bi bi-plus-lg me-1"></i> Đặt lịch mới</a>
                </div>
                
                <div id="upcomingAppointments">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0" style="border-radius: 1rem;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Chỉnh sửa hồ sơ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" id="p_fullName" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Ngày sinh</label>
                                <input type="date" class="form-control" id="p_dob">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Giới tính</label>
                                <select class="form-select" id="p_gender">
                                    <option value="male">Nam</option>
                                    <option value="female">Nữ</option>
                                    <option value="other">Khác</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">CCCD/CMND</label>
                            <input type="text" class="form-control" id="p_idCard">
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary-gradient" id="btnSaveProfile">Lưu thay đổi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = api.getUser();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            if (user.roleName !== 'patient') {
                window.location.href = '/';
                return;
            }
            
            loadProfile();
            loadUpcoming();
        });

        async function loadProfile() {
            try {
                const res = await api.get('/patients/me');
                const p = res.data;
                document.getElementById('profileName').textContent = p.fullName;
                if(p.user && p.user.avatarUrl) {
                    document.getElementById('profileAvatar').src = '/uploads/' + p.user.avatarUrl;
                } else {
                    document.getElementById('profileAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(p.fullName)}`;
                }
                
                // fill form
                document.getElementById('p_fullName').value = p.fullName;
                document.getElementById('p_dob').value = p.dateOfBirth ? p.dateOfBirth.split('T')[0] : '';
                document.getElementById('p_gender').value = p.gender || 'male';
                document.getElementById('p_idCard').value = p.idCard || '';
            } catch (e) {
                console.error(e);
            }
        }

        async function loadUpcoming() {
            try {
                // Fetch pending/confirmed
                const res = await api.get('/appointments', { limit: 5 });
                const arr = res.data.filter(a => a.status === 'pending' || a.status === 'confirmed');
                const container = document.getElementById('upcomingAppointments');
                
                if (arr.length === 0) {
                    container.innerHTML = `
                        <div class="glass-card p-5 text-center">
                            <i class="bi bi-calendar-x text-secondary" style="font-size: 3rem;"></i>
                            <h5 class="mt-3 text-secondary">Bạn chưa có lịch hẹn sắp tới nào</h5>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = '';
                arr.forEach(a => {
                    const statusBadge = a.status === 'confirmed' 
                        ? '<span class="badge bg-success text-white">Đã xác nhận</span>'
                        : '<span class="badge bg-warning text-dark">Chờ xác nhận</span>';
                        
                    container.innerHTML += `
                        <div class="glass-card p-4 mb-3 d-flex flex-column flex-md-row justify-content-between align-items-md-center">
                            <div class="d-flex align-items-center mb-3 mb-md-0">
                                <div class="bg-primary-subtle text-primary rounded text-center p-2 me-4" style="min-width: 80px;">
                                    <div class="small fw-bold">${new Date(a.appointmentDate).toLocaleDateString('vi-VN', {month:'short'})}</div>
                                    <div class="fs-3 fw-bold">${new Date(a.appointmentDate).getDate()}</div>
                                </div>
                                <div>
                                    <h5 class="fw-bold mb-1">BS. ${a.doctorName}</h5>
                                    <p class="text-secondary small mb-1"><i class="bi bi-clock me-1"></i> ${a.startTime.substring(0,5)} - ${a.endTime.substring(0,5)}</p>
                                    <p class="text-secondary small mb-0"><i class="bi bi-geo-alt me-1"></i> ${a.clinicName}</p>
                                </div>
                            </div>
                            <div class="text-md-end">
                                <div class="mb-2">${statusBadge}</div>
                                ${a.status === 'pending' ? `<button class="btn btn-sm btn-outline-danger rounded-pill" onclick="cancelApt(${a.id})">Hủy lịch</button>` : ''}
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error(e);
            }
        }
        
        async function cancelApt(id) {
            if(!confirm('Bạn có chắc muốn hủy lịch hẹn này?')) return;
            try {
                await api.put(`/appointments/${id}/cancel`, { status: 'cancelled', cancelReason: 'Bệnh nhân tự hủy' });
                api.showToast('Hủy lịch thành công');
                loadUpcoming();
            } catch (e) {
                api.showToast(e.message, 'error');
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSaveProfile');
            btn.disabled = true;
            try {
                await api.put('/patients/me', {
                    fullName: document.getElementById('p_fullName').value,
                    dateOfBirth: document.getElementById('p_dob').value || null,
                    gender: document.getElementById('p_gender').value,
                    idCard: document.getElementById('p_idCard').value
                });
                api.showToast('Cập nhật thành công');
                bootstrap.Modal.getInstance(document.getElementById('editProfileModal')).hide();
                loadProfile();
            } catch (err) {
                api.showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
