<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử khám - MediFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top navbar-glass">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-heart-pulse-fill text-danger me-2"></i>MediFlow
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto me-3">
                    <li class="nav-item"><a class="nav-link fw-medium" href="/patient/dashboard.html">Bảng điều khiển</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium text-primary" href="/patient/history.html">Lịch sử khám</a></li>
                </ul>
                <div id="nav-right" class="d-flex align-items-center"></div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
            <h4 class="fw-bold mb-0">Lịch sử khám bệnh</h4>
        </div>
        
        <div class="glass-card p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Ngày khám</th>
                            <th>Bác sĩ</th>
                            <th>Chuyên khoa</th>
                            <th>Triệu chứng</th>
                            <th>Chẩn đoán</th>
                            <th class="text-end pe-4">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable">
                        <tr>
                            <td colspan="6" class="text-center py-4">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0" style="border-radius: 1rem;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Đánh giá Bác sĩ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="reviewForm">
                        <input type="hidden" id="r_appointmentId">
                        <div class="mb-3 text-center">
                            <label class="form-label d-block fw-medium mb-3">Chất lượng khám</label>
                            <div class="fs-2 text-warning" id="starRating">
                                <i class="bi bi-star" data-rating="1" style="cursor:pointer"></i>
                                <i class="bi bi-star" data-rating="2" style="cursor:pointer"></i>
                                <i class="bi bi-star" data-rating="3" style="cursor:pointer"></i>
                                <i class="bi bi-star" data-rating="4" style="cursor:pointer"></i>
                                <i class="bi bi-star" data-rating="5" style="cursor:pointer"></i>
                            </div>
                            <input type="hidden" id="r_rating" value="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Góp ý / Nhận xét (Tùy chọn)</label>
                            <textarea class="form-control" id="r_comment" rows="3" placeholder="Chia sẻ trải nghiệm của bạn..."></textarea>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary-gradient" id="btnSubmitReview">Gửi đánh giá</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0" style="border-radius: 1rem;">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Chi tiết hồ sơ bệnh án</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="detailContent">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        let histories = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();

            // Star rating logic
            const stars = document.querySelectorAll('#starRating i');
            stars.forEach(star => {
                star.addEventListener('click', (e) => {
                    const rating = e.target.getAttribute('data-rating');
                    document.getElementById('r_rating').value = rating;
                    stars.forEach(s => {
                        if (s.getAttribute('data-rating') <= rating) {
                            s.classList.remove('bi-star');
                            s.classList.add('bi-star-fill');
                        } else {
                            s.classList.remove('bi-star-fill');
                            s.classList.add('bi-star');
                        }
                    });
                });
            });
        });

        async function loadHistory() {
            try {
                const res = await api.get('/medical-history/me');
                histories = res.data;
                const tbody = document.getElementById('historyTable');
                
                if(histories.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-secondary">Chưa có lịch sử khám nào</td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                histories.forEach(h => {
                    const date = new Date(h.visitDate).toLocaleDateString('vi-VN');
                    tbody.innerHTML += `
                        <tr>
                            <td class="ps-4 fw-medium">${date}</td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary-subtle text-primary rounded-circle d-flex justify-content-center align-items-center me-2" style="width: 32px; height: 32px;">
                                        <i class="bi bi-person"></i>
                                    </div>
                                    ${h.doctorName}
                                </div>
                            </td>
                            <td><span class="badge badge-soft-primary">${h.specialtyName}</span></td>
                            <td class="text-truncate" style="max-width: 150px;">${h.symptoms || '-'}</td>
                            <td class="text-truncate" style="max-width: 150px;">${h.diagnosis || '-'}</td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-outline-primary rounded-pill me-1" onclick="viewDetail('${h.id}')">Chi tiết</button>
                                <button class="btn btn-sm btn-warning rounded-pill text-white" onclick="openReview(${h.appointmentId})">Đánh giá</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error(e);
            }
        }

        function viewDetail(id) {
            const h = histories.find(x => x.id === id);
            if(!h) return;
            
            const html = `
                <div class="row g-4">
                    <div class="col-md-6">
                        <h6 class="text-secondary small text-uppercase mb-1">Thông tin chung</h6>
                        <div class="bg-light p-3 rounded mb-3">
                            <p class="mb-1"><strong>Ngày khám:</strong> ${new Date(h.visitDate).toLocaleDateString('vi-VN')}</p>
                            <p class="mb-1"><strong>Bác sĩ:</strong> ${h.doctorName}</p>
                            <p class="mb-1"><strong>Chuyên khoa:</strong> ${h.specialtyName}</p>
                            <p class="mb-0"><strong>Phòng khám:</strong> ${h.clinicName}</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h6 class="text-secondary small text-uppercase mb-1">Tình trạng</h6>
                        <div class="bg-light p-3 rounded mb-3">
                            <p class="mb-1"><strong>Triệu chứng:</strong> <br>${h.symptoms || 'Không ghi nhận'}</p>
                        </div>
                    </div>
                    <div class="col-12">
                        <h6 class="text-secondary small text-uppercase mb-1">Kết luận y khoa</h6>
                        <div class="p-3 rounded border border-primary-subtle bg-white">
                            <p class="mb-2"><strong>Chẩn đoán:</strong><br> ${h.diagnosis || 'Đang cập nhật'}</p>
                            <hr class="text-muted">
                            <p class="mb-0"><strong>Đơn thuốc / Hướng dẫn:</strong><br> ${h.prescription || 'Không có'}</p>
                        </div>
                        ${h.note ? `<p class="mt-3 text-muted small"><i class="bi bi-info-circle me-1"></i> Ghi chú nội bộ: ${h.note}</p>` : ''}
                    </div>
                </div>
            `;
            document.getElementById('detailContent').innerHTML = html;
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        }

        function openReview(appointmentId) {
            document.getElementById('r_appointmentId').value = appointmentId;
            document.getElementById('r_rating').value = '0';
            document.getElementById('r_comment').value = '';
            document.querySelectorAll('#starRating i').forEach(s => {
                s.classList.remove('bi-star-fill');
                s.classList.add('bi-star');
            });
            new bootstrap.Modal(document.getElementById('reviewModal')).show();
        }

        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const rating = parseInt(document.getElementById('r_rating').value);
            if(rating === 0) return api.showToast('Vui lòng chọn số sao đánh giá', 'error');
            
            const btn = document.getElementById('btnSubmitReview');
            btn.disabled = true;
            try {
                await api.post('/reviews', {
                    appointmentId: parseInt(document.getElementById('r_appointmentId').value),
                    rating: rating,
                    comment: document.getElementById('r_comment').value
                });
                api.showToast('Cảm ơn bạn đã đánh giá!');
                bootstrap.Modal.getInstance(document.getElementById('reviewModal')).hide();
            } catch (err) {
                api.showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
