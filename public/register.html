<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - MediFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #e0eaff 0%, #f8faff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,.1); max-width: 480px; width: 100%; }
        .btn-register { background: linear-gradient(135deg, #4f8ef7, #3b5de7); border: none; border-radius: .75rem; padding: .75rem; font-weight: 600; font-size: 1rem; letter-spacing: .3px; }
        .btn-register:hover { opacity: .9; }
        .form-control { border-radius: .75rem; padding: .7rem 1rem; border: 1.5px solid #e2e8f0; }
        .form-control:focus { border-color: #4f8ef7; box-shadow: 0 0 0 .2rem rgba(79,142,247,.15); }
        .logo-icon { width: 52px; height: 52px; background: linear-gradient(135deg, #4f8ef7, #3b5de7); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
        #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; min-width: 300px; }
        .toast-msg { padding: .75rem 1rem; border-radius: .75rem; margin-bottom: .5rem; font-size: .9rem; display: flex; align-items: center; gap: .5rem; animation: slideIn .3s ease; }
        .toast-success { background: #dcfce7; color: #16a34a; border: 1px solid #86efac; }
        .toast-error { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="card p-4 p-md-5 mx-3">
    <div class="text-center mb-4">
        <div class="logo-icon">
            <i class="bi bi-heart-pulse-fill text-white fs-4"></i>
        </div>
        <h4 class="fw-bold mb-1">MediFlow</h4>
        <p class="text-secondary small mb-0">Tạo tài khoản để trải nghiệm dịch vụ</p>
    </div>

    <div class="mb-3">
        <label class="form-label fw-medium">Họ và tên</label>
        <input type="text" class="form-control" id="inp-fullname" placeholder="Vd: Nguyễn Văn A">
    </div>
    <div class="mb-3">
        <label class="form-label fw-medium">Email</label>
        <input type="text" class="form-control" id="inp-email" placeholder="Vd: name@example.com">
    </div>
    <div class="mb-3">
        <label class="form-label fw-medium">Số điện thoại</label>
        <input type="text" class="form-control" id="inp-phone" placeholder="Vd: 0912345678">
    </div>
    <div class="mb-4">
        <label class="form-label fw-medium">Mật khẩu</label>
        <input type="password" class="form-control" id="inp-password" placeholder="Ít nhất 6 ký tự">
    </div>

    <button class="btn btn-register btn-primary w-100 text-white mb-3" id="btn-register" onclick="doRegister()">
        Đăng ký
    </button>

    <div class="text-center small text-secondary">
        Đã có tài khoản? <a href="/login.html" class="text-primary fw-semibold text-decoration-none">Đăng nhập ngay</a>
    </div>
</div>

<script>
    const API_BASE = '/api';

    function showToast(msg, type) {
        const c = document.getElementById('toast-container');
        const d = document.createElement('div');
        const icon = type === 'success' ? '✅' : '❌';
        d.className = 'toast-msg toast-' + (type || 'success');
        d.innerHTML = icon + ' ' + msg;
        c.appendChild(d);
        setTimeout(() => d.remove(), 5000);
    }

    async function doRegister() {
        const fullName = document.getElementById('inp-fullname').value.trim();
        const email = document.getElementById('inp-email').value.trim();
        const phone = document.getElementById('inp-phone').value.trim();
        const password = document.getElementById('inp-password').value;
        const btn = document.getElementById('btn-register');

        if (!fullName || !email || !password) {
            showToast('Vui lòng nhập đầy đủ các trường bắt buộc', 'error');
            return;
        }

        if (!email.includes('@')) {
            showToast('Email không đúng định dạng', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang xử lý...';

        try {
            const resp = await fetch(API_BASE + '/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, email, phone, password, roleName: 'patient' })
            });

            const json = await resp.json();

            if (!resp.ok || !json.success) {
                // If it's a validation error array
                if (json.errors && json.errors.length > 0) {
                    throw new Error(json.errors[0].msg);
                }
                throw new Error(json.message || 'Đăng ký thất bại');
            }

            showToast('Đăng ký thành công! Đang chuyển đến trang đăng nhập...', 'success');

            setTimeout(() => {
                window.location.replace('/login.html');
            }, 1500);

        } catch (err) {
            showToast(err.message || 'Đăng ký thất bại', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Đăng ký';
        }
    }
</script>
</body>
</html>
