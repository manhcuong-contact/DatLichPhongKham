<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng khám - MediFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top navbar-glass">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-heart-pulse-fill text-danger me-2"></i>MediFlow
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link fw-medium" href="/">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="/specialties.html">Chuyên khoa</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium text-primary" href="/clinics.html">Phòng khám</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="/doctors.html">Bác sĩ</a></li>
                </ul>
                <div id="nav-right" class="d-flex align-items-center"></div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5 pb-5">
        <div class="text-center mb-5 mt-4">
            <h2 class="fw-bold">Hệ thống Phòng khám</h2>
            <p class="text-secondary">Khám phá các cơ sở y tế uy tín, chất lượng cao trên toàn quốc.</p>
        </div>
        
        <!-- Filter Form for Haversine (Near me) -->
        <div class="glass-card p-4 mb-4">
            <form id="filterForm" class="row g-3 align-items-center">
                <div class="col-md-5">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-secondary"></i></span>
                        <input type="text" class="form-control border-start-0" id="f_search" placeholder="Tên phòng khám hoặc thành phố...">
                    </div>
                </div>
                <div class="col-md-4">
                    <button type="button" class="btn btn-outline-secondary w-100" id="btnNearMe">
                        <i class="bi bi-geo-alt me-1"></i> Tìm phòng khám gần tôi
                    </button>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary-gradient w-100">Tìm kiếm</button>
                </div>
            </form>
        </div>

        <div class="row g-4" id="clinicsList">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadClinics();
        });

        document.getElementById('filterForm').addEventListener('submit', (e) => {
            e.preventDefault();
            loadClinics(document.getElementById('f_search').value);
        });

        document.getElementById('btnNearMe').addEventListener('click', () => {
            if (navigator.geolocation) {
                const btn = document.getElementById('btnNearMe');
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Đang định vị...';
                
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    btn.innerHTML = '<i class="bi bi-geo-alt me-1"></i> Tìm phòng khám gần tôi';
                    
                    try {
                        const res = await api.get(`/clinics/nearby?lat=${lat}&lng=${lng}&radius=50`);
                        renderClinics(res.data, true);
                    } catch (err) {
                        api.showToast('Lỗi khi lấy dữ liệu phòng khám gần đây', 'error');
                    }
                }, (err) => {
                    btn.innerHTML = '<i class="bi bi-geo-alt me-1"></i> Tìm phòng khám gần tôi';
                    api.showToast('Vui lòng cho phép quyền truy cập vị trí trong trình duyệt để sử dụng tính năng này.', 'error');
                });
            } else {
                api.showToast('Trình duyệt của bạn không hỗ trợ định vị (Geolocation).', 'error');
            }
        });

        async function loadClinics(search = '') {
            try {
                let endpoint = '/clinics?limit=50';
                if(search) endpoint += `&search=${encodeURIComponent(search)}`;
                const res = await api.get(endpoint);
                renderClinics(res.data, false);
            } catch (e) {
                console.error(e);
            }
        }

        function renderClinics(clinics, isNearby) {
            const container = document.getElementById('clinicsList');
            if(clinics.length === 0) {
                container.innerHTML = `<div class="col-12 text-center py-5 text-secondary">Không tìm thấy phòng khám nào</div>`;
                return;
            }
            
            container.innerHTML = '';
            clinics.forEach(item => {
                const dist = isNearby && item.distance ? `<span class="badge bg-danger rounded-pill"><i class="bi bi-geo-alt-fill me-1"></i>${item.distance.toFixed(1)} km</span>` : '';
                container.innerHTML += `
                    <div class="col-md-6 col-lg-4">
                        <div class="glass-card h-100 position-relative">
                            ${dist ? `<div class="position-absolute top-0 end-0 m-3 z-3">${dist}</div>` : ''}
                            <img src="${item.imageUrl ? '/uploads/'+item.imageUrl : 'https://placehold.co/600x400/e0f2fe/0ea5e9?text=Clinic'}" class="card-img-top object-fit-cover" height="200" alt="${item.name}">
                            <div class="p-4">
                                <h5 class="fw-bold mb-2">${item.name}</h5>
                                <p class="text-secondary small mb-2"><i class="bi bi-geo-alt me-1"></i> ${item.address}, ${item.city}</p>
                                <p class="text-secondary small mb-3"><i class="bi bi-clock me-1"></i> ${item.openTime.substring(0,5)} - ${item.closeTime.substring(0,5)}</p>
                                <a href="/doctors.html" class="btn btn-outline-primary rounded-pill w-100">Xem Bác sĩ</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
